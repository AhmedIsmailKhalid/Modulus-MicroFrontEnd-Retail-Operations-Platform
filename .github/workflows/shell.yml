name: Shell CI/CD

on:
  push:
    branches: [main]
    paths:
      - "apps/shell/**"
      - "packages/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/shell/**"
      - "packages/**"

jobs:
  pipeline:
    name: Shell Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npx turbo run typecheck --filter=@modulus/shell

      - name: Lint
        run: npx turbo run lint --filter=@modulus/shell
        continue-on-error: true

      - name: Build
        run: npx turbo run build --filter=@modulus/shell
        env:
          NODE_ENV: production
          VITE_INVENTORY_URL: https://modulus-retail-operations-platform-inventory-mfe.vercel.app
          VITE_ORDERS_URL: https://modulus-retail-operations-platform-orders-mfe.vercel.app
          VITE_ANALYTICS_URL: https://modulus-retail-operations-platform-analytics-mfe.vercel.app

      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          npm install -g vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.SHELL_PROJECT_ID }}
          VITE_INVENTORY_URL: https://modulus-retail-operations-platform-inventory-mfe.vercel.app
          VITE_ORDERS_URL: https://modulus-retail-operations-platform-orders-mfe.vercel.app
          VITE_ANALYTICS_URL: https://modulus-retail-operations-platform-analytics-mfe.vercel.app

      - name: Run E2E Suite
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cd playwright
          npm ci
          npx playwright install chromium --with-deps
          npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: https://modulus-retail-operations-platform-shell.vercel.app
        continue-on-error: true

      - name: Publish E2E Report to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.PAGES_TOKEN }}
          publish_dir: playwright/playwright-report
          destination_dir: e2e-reports/${{ github.run_id }}
        continue-on-error: true

      - name: Email Alert on Failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Modulus shell pipeline failed — Run #${{ github.run_id }}"
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: Modulus CI <${{ secrets.MAIL_USERNAME }}>
          body: |
            Pipeline failure detected in the Modulus shell application.

            Repository: ${{ github.repository }}
            Branch:     ${{ github.ref_name }}
            Commit:     ${{ github.sha }}
            Run ID:     ${{ github.run_id }}

            View the failed run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
