name: Orders CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/orders/**"
      - "packages/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/orders/**"
      - "packages/**"

jobs:
  pipeline:
    name: Orders Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npx turbo run typecheck --filter=@modulus/orders

      - name: Lint
        run: npx turbo run lint --filter=@modulus/orders
        continue-on-error: true

      - name: Build
        run: npx turbo run build --filter=@modulus/orders
        env:
          NODE_ENV: production

      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          npm install -g vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.ORDERS_PROJECT_ID }}

      - name: Email Alert on Failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Modulus orders pipeline failed — Run #${{ github.run_id }}"
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: Modulus CI <${{ secrets.MAIL_USERNAME }}>
          body: |
            Pipeline failure detected in the Modulus orders application.

            Repository: ${{ github.repository }}
            Branch:     ${{ github.ref_name }}
            Commit:     ${{ github.sha }}
            Run ID:     ${{ github.run_id }}

            View the failed run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
